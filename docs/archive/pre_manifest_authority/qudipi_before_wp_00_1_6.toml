[operators.information_bounds]
engine = "python"
entrypoint = "qudipi_analysis.information:execute"
input_schema = "information_inputs_v1"
output_schema = "information_bounds_report_v1"
resource_profile = "default"

[operators.simulation]
engine = "python"
entrypoint = "qudipi_analysis.simulation:execute"
