[operators.observability]
engine = "python"
entrypoint = "qudipi_analysis.observation:observability"
input_schema = "observation_operator_v1"
output_schema = "observability_report_v1"
resource_profile = "default"

[operators.colorimetry]
engine = "python"
entrypoint = "qudipi_analysis.colorimetry:execute"
input_schema = "colorimetry_inputs_v1"
output_schema = "colorimetry_report_v1"
resource_profile = "default"

[operators.skin_physics]
engine = "python"
entrypoint = "qudipi_analysis.physics:execute"
input_schema = "skin_physics_inputs_v1"
output_schema = "skin_physics_report_v1"
