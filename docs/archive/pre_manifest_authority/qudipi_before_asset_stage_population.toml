[application]
id = "qudipi"
phase = 1
study = "truecolor"
research_pack = "skin_photon"
single_config_authority = true

[runtime]
max_cpu_percent = 30
max_gpu_percent = 30
max_memory_gib = 24
max_concurrent_workers = 2

[governance]
default_access_class = "project_private"
autonomous_agents = false
autonomous_claim_adjudication = false

[licenses]
default_approved = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib"]
reject_unknown = true
reject_paid_runtime = true
reject_mandatory_cloud = true

[operators.governance]
engine = "rust"
entrypoint = "qudipi_config::validate"
input_schema = "control.v1"
output_schema = "control.v1"
resource_profile = "default"

[operators.prior_art_grounding]
engine = "python"
entrypoint = "qudipi_analysis.grounding:execute"
