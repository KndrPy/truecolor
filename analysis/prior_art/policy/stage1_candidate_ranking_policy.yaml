policy_version: 2.0.0
policy_name: complete_prior_art_candidate_ranking
purpose: Prioritize verification and screening of every harvested candidate without treating ranking as
  source admission, scientific validity, novelty adjudication, or ground truth.
admissibility_statement: No candidate becomes admissible prior art solely because of its score, rank,
  identifier, citation count, recency, or metadata classification.
score_weights:
  domain_term_hit: 1.5
  domain_term_hit_cap: 8
  title_term_bonus: 1.0
  title_term_bonus_cap: 6
  doi_present: 2.0
  pmid_present: 2.0
  abstract_available: 1.0
  primary_publication_type: 2.0
  secondary_publication_type: -4.0
  citation_log10_cap: 3.0
  publication_year_2020_or_later: 1.0
  publication_year_before_1990: -0.5
  title_exclusion_term: -10.0
  missing_title: -20.0
  title_shorter_than_15_characters: -3.0
global_priority:
  formula: maximum_domain_score + domain_breadth_weight * (domain_count - 1)
  domain_breadth_weight: 0.25
  tie_break_order:
  - global_priority_score_descending
  - maximum_domain_score_descending
  - domain_count_descending
  - citation_count_descending
  - publication_year_descending
  - canonical_key_ascending
domain_rank_tie_break_order:
- domain_score_descending
- citation_count_descending
- publication_year_descending
- canonical_key_ascending
shortlist_policy:
  top_per_domain: 20
  role: derived_review_view_only
  authoritative_ranking: false
