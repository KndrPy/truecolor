scope_restrictions:
- Stage 0 establishes program governance, falsification and reproducibility controls. It does not validate
  downstream scientific claims.
- Registration of a dataset establishes its intended and prohibited analytical roles; registration does
  not establish dataset-level admissibility.
- SCIN is registered for image-domain robustness, acquisition heterogeneity, condition diversity and domain-shift
  analysis. It is not admitted as spectral, calibrated colorimetric, melanin or pathology-confirmed ground
  truth.
- Legacy evidence remains noncanonical until re-executed or explicitly admitted under the canonical artifact
  contract.
