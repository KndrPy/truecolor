name: Stage 1 S1-M02 through S1-M09

on:
  push:
    branches:
      - analysis/canonical-stage0-refactor
    paths:
      - "analysis/stage1/canonical_stage1_contracts.py"
      - "analysis/stage1/m02_source_preflight.py"
      - "analysis/stage1/m03_spatial_ocr.py"
      - "analysis/stage1/m03_hybrid_reconstruction.py"
      - "analysis/stage1/m03_m09_evidence_pipeline.py"
      - "analysis/stage1/m03_m09_evidence_pipeline_v2.py"
      - "tests/stage1/test_s1_m03_spatial_ocr.py"
      - "tests/stage1/test_s1_m03_hybrid_reconstruction.py"
      - "tests/stage1/test_s1_m02_m09_canonical_pipeline.py"
      - ".github/workflows/stage1-m02-m09.yml"
  pull_request:
    paths:
      - "analysis/stage1/canonical_stage1_contracts.py"
      - "analysis/stage1/m02_source_preflight.py"
      - "analysis/stage1/m03_spatial_ocr.py"
      - "analysis/stage1/m03_hybrid_reconstruction.py"
      - "analysis/stage1/m03_m09_evidence_pipeline.py"
      - "analysis/stage1/m03_m09_evidence_pipeline_v2.py"
      - "tests/stage1/test_s1_m03_spatial_ocr.py"
      - "tests/stage1/test_s1_m03_hybrid_reconstruction.py"
      - "tests/stage1/test_s1_m02_m09_canonical_pipeline.py"
      - ".github/workflows/stage1-m02-m09.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-stage1-m02-m09:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONHASHSEED: "0"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bounded local runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils tesseract-ocr
          python -m pip install --upgrade pip
          python -m pip install pytest pymupdf pyarrow
      - name: Compile canonical Stage 1 modules
        run: |
          python -m compileall -q \
            analysis/stage1/canonical_stage1_contracts.py \
            analysis/stage1/m02_source_preflight.py \
            analysis/stage1/m03_spatial_ocr.py \
            analysis/stage1/m03_hybrid_reconstruction.py \
            analysis/stage1/m03_m09_evidence_pipeline.py \
            analysis/stage1/m03_m09_evidence_pipeline_v2.py
      - name: Run closure and falsification tests
        run: |
          python -m pytest -q \
            tests/stage1/test_s1_m03_spatial_ocr.py \
            tests/stage1/test_s1_m03_hybrid_reconstruction.py \
            tests/stage1/test_s1_m02_m09_canonical_pipeline.py
